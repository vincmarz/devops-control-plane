apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-control-plane-environments
data:
  environments.yaml: |
    environments:
      - name: dev
        applicationName: demo-go-color-app
        displayName: Development
        enabled: true
        category: development
        description: Current active development environment.
        clusterName: ocp-dev
        kubernetesNamespace: devops-ci-demo
        tektonNamespace: devops-ci-demo
        argocdApplicationName: demo-go-color-app
        gitTargetBranch: main
        validationPath: apps/demo-go-color-app
        allowTechnicalActions: true
        allowPromotionSource: true
        allowPromotionTarget: false
      - name: staging
        applicationName: demo-go-color-app
        displayName: Staging namespace-isolated on dev cluster
        enabled: true
        category: preproduction
        description: Namespace-isolated staging environment running on ocp-dev.
        clusterName: ocp-dev
        kubernetesNamespace: devops-ci-staging
        tektonNamespace: devops-ci-staging
        argocdApplicationName: demo-go-color-app-staging
        gitTargetBranch: main
        validationPath: apps/demo-go-color-app/overlays/staging
        allowTechnicalActions: true
        allowPromotionSource: false
        allowPromotionTarget: true
      - name: production
        applicationName: demo-go-color-app
        displayName: Production namespace-isolated on dev cluster
        enabled: true
        category: production
        description: Namespace-isolated simulated production environment running on ocp-dev. No real production credentials are used.
        clusterName: ocp-dev
        kubernetesNamespace: devops-ci-production
        tektonNamespace: devops-ci-production
        argocdApplicationName: demo-go-color-app-production
        gitTargetBranch: main
        validationPath: apps/demo-go-color-app/overlays/production
        allowTechnicalActions: true
        allowPromotionSource: false
        allowPromotionTarget: true
      - name: github-source-validation-dev
        applicationName: github-source-validation
        displayName: GitHub Source Validation Dev
        enabled: true
        category: technical
        description: Technical environment used to validate GitHub as source repository provider with branch creation only.
        clusterName: ocp-dev
        kubernetesNamespace: devops-ci-demo
        tektonNamespace: devops-ci-demo
        argocdApplicationName: demo-go-color-app
        gitTargetBranch: main
        validationPath: apps/demo-go-color-app
        allowTechnicalActions: true
        allowPromotionSource: false
        allowPromotionTarget: false
