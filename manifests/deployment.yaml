apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-control-plane
  namespace: devops-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-control-plane
  template:
    metadata:
      labels:
        app: devops-control-plane
    spec:
      serviceAccountName: devops-control-plane
      containers:
        - name: devops-control-plane
          image: image-registry.openshift-image-registry.svc:5000/devops-control-plane/devops-control-plane:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: devops-control-plane-config
            - secretRef:
                name: devops-control-plane-secrets
          volumeMounts:
            - name: dcp-trust-bundle
              mountPath: /etc/dcp-trust
              readOnly: true
            - name: dcp-applications
              mountPath: /etc/dcp-applications
              readOnly: true
            - name: dcp-environments
              mountPath: /etc/dcp-environments
              readOnly: true
            - name: dcp-clusters
              mountPath: /etc/dcp-clusters
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: dcp-trust-bundle
          configMap:
            name: dcp-app-trust-bundle
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
        - name: dcp-applications
          configMap:
            name: devops-control-plane-applications
            items:
              - key: applications.yaml
                path: applications.yaml
        - name: dcp-environments
          configMap:
            name: devops-control-plane-environments
            items:
              - key: environments.yaml
                path: environments.yaml
        - name: dcp-clusters
          configMap:
            name: devops-control-plane-clusters
            items:
              - key: clusters.yaml
                path: clusters.yaml
