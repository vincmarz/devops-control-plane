apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-control-plane
  namespace: devops-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-control-plane
  template:
    metadata:
      labels:
        app: devops-control-plane
    spec:
      serviceAccountName: devops-control-plane
      containers:
        - name: devops-control-plane
          image: devops-control-plane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: devops-control-plane-config
            - secretRef:
                name: devops-control-plane-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
