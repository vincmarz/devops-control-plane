apiVersion: v1
kind: ConfigMap
metadata:
  name: devops-control-plane-config
  namespace: devops-control-plane
data:
  HTTP_ADDR: ":8080"
  LOG_LEVEL: "info"

  # GitLab lab integration. Token is stored in Secret.
  GITLAB_BASE_URL: "https://gitlab-devops-gitlab.apps.ocp4.mim.lan"
  GITLAB_PROJECT_ID: "1"
  GITLAB_DEFAULT_BRANCH: "main"
  GITLAB_TIMEOUT_SECONDS: "30"
  GITLAB_INSECURE_TLS: "false"
  GITLAB_CA_FILE: "/etc/dcp-trust/ca-bundle.crt"

  # GitHub API metadata. Token will be supplied from Secret when the provider is wired.
  GITHUB_API_URL: "https://api.github.com"
  GITHUB_TIMEOUT_SECONDS: "30"
  GITHUB_INSECURE_TLS: "false"
  GITHUB_CA_FILE: ""

  # Argo CD / OpenShift GitOps lab integration. Token is stored in Secret.
  ARGOCD_BASE_URL: "https://openshift-gitops-server-openshift-gitops.apps.ocp4.mim.lan"
  ARGOCD_INSECURE_TLS: "false"
  ARGOCD_CA_FILE: "/etc/dcp-trust/ca-bundle.crt"
  ARGOCD_TIMEOUT_SECONDS: "30"
  ARGOCD_POLL_INTERVAL_SECONDS: "5"

  # Tekton validation runs in the application/CI namespace.
  TEKTON_NAMESPACE: "devops-ci-demo"
  TEKTON_PIPELINE_NAME: "validate-gitops"
  TEKTON_SERVICE_ACCOUNT: "pipeline"
  TEKTON_TIMEOUT_SECONDS: "900"
  TEKTON_POLL_INTERVAL_SECONDS: "5"
  TEKTON_GIT_URL: "https://github.com/vincmarz/demo-app-gitops.git"
  TEKTON_GIT_REVISION: "main"
  TEKTON_GIT_REVISION_TEMPLATE: "change/{changeNumber}"
  TEKTON_VALIDATION_PATH: "apps/demo-go-color-app"
  TEKTON_IMAGE: "unused"
  TEKTON_WORKSPACE_PVC: "pipeline-workspace"
  TEKTON_DOCKERCONFIG_SECRET: "pipeline-registry-dockerconfig"

  # Kubernetes API access for Tekton and runtime evidence collection.
  # Uses ServiceAccount token fallback by default. Static KUBERNETES_TOKEN is no longer required.
  KUBERNETES_API_URL: "https://api.ocp4.mim.lan:6443"
  KUBERNETES_INSECURE_TLS: "false"
  KUBERNETES_CA_FILE: ""
  KUBERNETES_NAMESPACE: "devops-ci-demo"
  EVIDENCE_BASE_PATH: ""

  # Application Catalog runtime loading. File is mounted from devops-control-plane-applications ConfigMap.
  APPLICATION_CATALOG_FILE: "/etc/dcp-applications/applications.yaml"

  # Environment Catalog runtime loading. File is mounted from devops-control-plane-environments ConfigMap.
  ENVIRONMENT_CATALOG_FILE: "/etc/dcp-environments/environments.yaml"

  # Cluster Registry runtime loading. File is mounted from devops-control-plane-clusters ConfigMap.
  CLUSTER_REGISTRY_FILE: "/etc/dcp-clusters/clusters.yaml"

  # AuthN/AuthZ. Enabled behind OpenShift OAuth Proxy.
  AUTH_ENABLED: "true"
  AUTH_HEADER_USER: "X-Forwarded-User"
  AUTH_HEADER_GROUPS: "X-Forwarded-Groups"
  AUTH_HEADER_ALT_USER: "X-Auth-Request-User"
  AUTH_OPENSHIFT_GROUP_LOOKUP_ENABLED: "true"
  AUTH_GROUP_VIEWER: "devops-control-plane-viewers"
  AUTH_GROUP_OPERATOR: "devops-control-plane-operators"
  AUTH_GROUP_APPROVER: "devops-control-plane-approvers"
  AUTH_GROUP_ADMIN: "devops-control-plane-admins"
