apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: devops-control-plane
  namespace: devops-control-plane
  labels:
    app.kubernetes.io/name: devops-control-plane
  annotations:
    devops-control-plane.phase: "9.3.8-design-only"
    devops-control-plane.note: "Template showing target Route for OAuth Proxy; do not apply directly without review."
spec:
  to:
    kind: Service
    name: devops-control-plane
  port:
    targetPort: https
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
