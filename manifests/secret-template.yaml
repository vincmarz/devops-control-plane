apiVersion: v1
kind: Secret
metadata:
  name: devops-control-plane-secrets
  namespace: devops-control-plane
type: Opaque
stringData:
  # Replace all placeholders locally before applying. Do not commit real values.
  DATABASE_URL: "postgres://devops_cp:<replace-me>@postgresql:5432/devops_control_plane?sslmode=disable"
  GITLAB_TOKEN: "<replace-me>"
  GITHUB_TOKEN: "<replace-me>"
  ARGOCD_AUTH_TOKEN: "<replace-me>"
  # Optional legacy override. Prefer the pod ServiceAccount token mounted by OpenShift.
  # KUBERNETES_TOKEN: "<replace-me>"

# KUBERNETES_TOKEN is optional from phase 9.6 onward.
# Runtime default: /var/run/secrets/kubernetes.io/serviceaccount/token
