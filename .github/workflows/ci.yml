name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Disposable PostgreSQL for the integration tests. A fresh container is
    # created per run, so it is safe for the integration suite to reset schema.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dcp
          POSTGRES_PASSWORD: dcp
          POSTGRES_DB: dcp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dcp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgres://dcp:dcp@localhost:5432/dcp_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Unit tests (race + coverage)
        # The integration build tag is NOT set here, so DB-backed tests are
        # excluded and this job stays fast and hermetic.
        run: go test ./... -race -covermode=atomic -coverprofile=coverage.out

      - name: Integration tests (PostgreSQL)
        run: go test -tags=integration ./internal/database/... -run Integration -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
